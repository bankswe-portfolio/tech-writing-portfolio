site_name: William Banks — Technical Writing Portfolio
site_description: Selected samples demonstrating how-to, conceptual, and reference documentation using a docs-as-code workflow.
site_url: https://bankswe-portfolio.github.io/tech-writing-portfolio
repo_url: https://github.com/bankswe-portfolio/tech-writing-portfolio
edit_uri: blob/main/docs/
theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: DM Sans
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - content.code.copy
    - content.action.edit
    - content.tabs.link
    - search.suggest
    - search.highlight
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.tabbed
  - pymdownx.snippets

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Case Studies:
      - cnquery Practical Guide: case-studies/cnquery-practical-guide_mkdocs.md
      - NodeZero Tripwires Redline: case-studies/horizon3ai-tripwires-redline.md
      - Chains vs. Agents in LangChain: case-studies/longchain-chains-vs-agents.md
  - Articles & Essays:
      - Overview: articles/index.md
      - OASBuilder and Automation-Ready API Docs: articles/oasbuilder.md
      - DocAgent and Multi-Agent Documentation Pipelines: articles/docagent.md
      - Documentation-to-Code Traceability with LLMs: articles/documentation-code-traceability.md
      - DocFetch and Cross-Artifact Documentation Grounding: articles/docfetch.md
      - RepoSummary and Feature-Level Traceability: articles/reposummary.md
      - Regenerating Software Architecture Descriptions: articles/software-architecture-descriptions.md
      - Outdated Documentation as a Repository Integrity Problem: articles/outdated-documentation-repository-integrity.md
  - Governance & AI Workflows: governance-ai-workflows.md
  - Workflow & About: about/about.md
