site_name: William Banks — Technical Writing Portfolio
site_description: Selected samples demonstrating how-to, conceptual, and reference documentation using a docs-as-code workflow.
site_url: https://bankswe-portfolio.github.io/tech-writing-portfolio
repo_url: https://github.com/bankswe-portfolio/tech-writing-portfolio
edit_uri: blob/main/docs/
theme:
  name: material
  palette:
    - scheme: default
      primary: blue grey
      accent: indigo
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - content.code.copy
    - content.action.edit
    - content.tabs.link
    - search.suggest
    - search.highlight
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.tabbed
  - pymdownx.snippets

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Case Studies:
      - cnquery Practical Guide: case-studies/cnquery-practical-guide_mkdocs.md
      - NodeZero Tripwires Redline: case-studies/horizon3ai-tripwires-redline.md
      - Chains vs. Agents in LangChain: case-studies/longchain-chains-vs-agents.md
  - Workflow & About: about/about.md
